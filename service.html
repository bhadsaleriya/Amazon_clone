<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f3f3f3;
        }

        .header{
            background:#232f3e;
            color:white;
            text-align:center;
            padding:40px;
        }

        .service-box{
            background:white;
            border-radius:10px;
            padding:20px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            height:100%;
        }

        .icon{
            font-size:40px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Customer Service</h2>
        <p>How can we help you today?</p>
    </div>

    <div class="container py-5">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="service-box">
                    <div class="icon">📦</div>
                    <h5>Your Orders</h5>
                    <p>Track, return, or replace items.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="service-box">
                    <div class="icon">💳</div>
                    <h5>Payment Help</h5>
                    <p>Manage cards and payment methods.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="service-box">
                    <div class="icon">📞</div>
                    <h5>Contact Us</h5>
                    <p>Reach our support team anytime.</p>
                </div>
            </div>

        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-dark">Back to Home</a>
        </div>
    </div>

</body>
</html>
