 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Registry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .header{
            background:#232f3e;
            color:white;
            text-align:center;
            padding:40px;
        }

        .card-box{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            text-align:center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🎁 Gift Registry</h2>
        <p>Create and manage your gift list</p>
    </div>

    <div class="container mt-5">
        <div class="card-box">
            <h4>Create Your Registry</h4>
            <p>Add your favorite products and share them with family and friends.</p>

            <button class="btn btn-warning">Create Registry</button>

            <div class="mt-4">
                <a href="index.html" class="btn btn-dark">Back to Home</a>
            </div>
        </div>
    </div>

</html>
