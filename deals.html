<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Deals</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .banner{
            background:#232f3e;
            color:white;
            text-align:center;
            padding:40px;
        }

        .deal-card{
            background:white;
            border-radius:10px;
            padding:15px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .deal-card:hover{
            transform:scale(1.03);
        }

        .deal-card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:8px;
        }

        .price{
            color:#B12704;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="banner">
        <h2>🔥 Today's Deals</h2>
        <p>Best offers available today</p>
    </div>

    <div class="container py-4">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="deal-card">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" alt="">
                    <h5 class="mt-3">Smart Watch</h5>
                    <p class="price">999</p>
                    <button class="btn btn-warning">Buy Now</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="deal-card">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" alt="">
                    <h5 class="mt-3">Headphones</h5>
                    <p class="price">799</p>
                    <button class="btn btn-warning">Buy Now</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="deal-card">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="">
                    <h5 class="mt-3">Running Shoes</h5>
                    <p class="price">599</p>
                    <button class="btn btn-warning">Buy Now</button>
                </div>
            </div>

        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-dark">Back to Home</a>
        </div>
    </div>

</body>
</html>
